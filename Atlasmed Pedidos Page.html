<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Atlasmed — Pedidos</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  * { box-sizing: border-box; }
  input, button, textarea { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/android-frame.jsx"></script>
<script type="text/babel" src="components/design-canvas.jsx"></script>
<script type="text/babel" src="components/atlas-ui.jsx"></script>
<script type="text/babel" src="components/atlas-pedidos.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>

      <DCSection id="orders-main"
        title="1 · Meus Pedidos"
        subtitle="Visão geral dos pedidos ativos e histórico. O botão Novo pedido fica fixo e centralizado no rodapé para máxima visibilidade.">
        <DCArtboard id="orders-list" label="Com pedidos · CTA fixo no rodapé" width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <MeusOrdersScreen/>
          </AndroidDevice>
        </DCArtboard>
        <DCArtboard id="orders-empty" label="Estado vazio · CTA fixo no rodapé" width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <MeusOrdersScreen emptyState/>
          </AndroidDevice>
        </DCArtboard>
      </DCSection>

      <DCSection id="order-detail"
        title="1b · Detalhes do Pedido"
        subtitle="Ao tocar em um pedido da lista, o usuário vê todos os dados: acompanhamento, rastreio, destino, itens e pagamento.">
        <DCArtboard id="detail-transit" label="Em trânsito · com rastreio" width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <OrderDetailScreen orderId="PED-2041"/>
          </AndroidDevice>
        </DCArtboard>
        <DCArtboard id="detail-delivered" label="Entregue · histórico completo" width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <OrderDetailScreen orderId="PED-2038"/>
          </AndroidDevice>
        </DCArtboard>
      </DCSection>

      <DCSection id="products"
        title="2 · Novo Pedido — Produtos"
        subtitle="Catálogo com busca, filtros por categoria e controle de quantidade.">
        <DCArtboard id="products-default" label="Vista padrão · sem itens" width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <NewOrderProductsScreen/>
          </AndroidDevice>
        </DCArtboard>
        <DCArtboard id="products-search" label={'Busca ativa · "atlas"'} width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <NewOrderProductsScreen searchQuery="atlas"/>
          </AndroidDevice>
        </DCArtboard>
        <DCArtboard id="products-cart" label="Carrinho em andamento" width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <NewOrderProductsScreen cart={SAMPLE_CART}/>
          </AndroidDevice>
        </DCArtboard>
      </DCSection>

      <DCSection id="cart-review"
        title="3 · Carrinho"
        subtitle="Revisão dos itens selecionados e subtotal antes do checkout.">
        <DCArtboard id="cart-screen" label="Revisão do carrinho" width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <CartScreen/>
          </AndroidDevice>
        </DCArtboard>
      </DCSection>

      <DCSection id="checkout"
        title="4 · Checkout"
        subtitle="Seleção de clínica e médico, resumo e confirmação do pedido.">
        <DCArtboard id="checkout-empty" label="Sem destino selecionado" width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <CheckoutScreen/>
          </AndroidDevice>
        </DCArtboard>
        <DCArtboard id="checkout-filled" label="Destino selecionado · pronto para confirmar" width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <CheckoutScreen prefilled/>
          </AndroidDevice>
        </DCArtboard>
      </DCSection>

      <DCSection id="order-success"
        title="5 · Confirmação"
        subtitle="Pedido confirmado com número, destino, itens e prazo de entrega.">
        <DCArtboard id="success-screen" label="Pedido confirmado" width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <OrderSuccessScreen/>
          </AndroidDevice>
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
