<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Atlasmed — BI Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  * { box-sizing: border-box; }
  input, button, textarea { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/ios-frame.jsx"></script>
<script type="text/babel" src="components/android-frame.jsx"></script>
<script type="text/babel" src="components/design-canvas.jsx"></script>
<script type="text/babel" src="components/atlas-logo.jsx"></script>
<script type="text/babel" src="components/atlas-ui.jsx"></script>
<script type="text/babel" src="components/atlas-data.jsx"></script>
<!-- atlas-map.jsx is loaded so FloatingMenu is defined, even though we
     don't render any map screens here. -->
<script type="text/babel" src="components/atlas-map.jsx"></script>
<script type="text/babel" src="components/atlas-bi.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="bi-main"
        title="Desempenho — visão do representante"
        subtitle="Snapshot, funil, oportunidades, conversão, cobertura, insights e recomendações em uma só tela.">
        <DCArtboard id="bi-full" label="Tela completa · rolagem" width={390} height={1600}>
          <div style={{
            position: 'absolute', inset: 0,
            background: '#f7f8fb', overflow: 'hidden',
          }}>
            <BIScreen/>
          </div>
        </DCArtboard>
        <DCArtboard id="bi-device" label="Dispositivo · topo" width={390} height={844}>
          <AndroidDevice width={390} height={844}>
            <BIScreen/>
          </AndroidDevice>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
