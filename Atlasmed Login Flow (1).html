<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Atlasmed — Login Flow</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  * { box-sizing: border-box; }
  input, button, textarea { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    z-index: 1000;
    font-family: 'Inter', system-ui, sans-serif;
    width: 240px;
    display: none;
  }
  .tweaks-panel.on { display: block; }
  .tweaks-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
    color: #666; margin-bottom: 12px;
  }
  .tweaks-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; color: #1a1a1a; font-weight: 500;
    padding: 8px 0;
  }
  .tweaks-seg { display: inline-flex; background: #f1f1f3; border-radius: 8px; padding: 2px; }
  .tweaks-seg button {
    border: none; background: transparent; padding: 4px 10px;
    font-size: 12px; font-weight: 500; color: #555; cursor: pointer;
    border-radius: 6px; transition: all 160ms;
  }
  .tweaks-seg button.on { background: #fff; color: #0a2f7f; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
</style>
</head>
<body>
<div id="root"></div>

<div class="tweaks-panel" id="tweaksPanel">
  <div class="tweaks-title">Tweaks</div>
  <div class="tweaks-row">
    <span>Modo</span>
    <div class="tweaks-seg" id="themeSeg">
      <button data-theme="dark" class="on">Escuro</button>
      <button data-theme="light">Claro</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/ios-frame.jsx"></script>
<script type="text/babel" src="components/android-frame.jsx"></script>
<script type="text/babel" src="components/design-canvas.jsx"></script>
<script type="text/babel" src="components/atlas-logo.jsx"></script>
<script type="text/babel" src="components/atlas-ui.jsx"></script>
<script type="text/babel" src="components/atlas-screens.jsx"></script>
<script type="text/babel" src="components/atlas-flow.jsx"></script>
<script type="text/babel" src="components/atlas-data.jsx"></script>
<script type="text/babel" src="components/atlas-list.jsx"></script>
<script type="text/babel" src="components/atlas-clinic.jsx"></script>
<script type="text/babel" src="components/atlas-doctor.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "theme": "dark"
}/*EDITMODE-END*/;

function Artboard({ screen, scenario = 'happy', initialScreen }) {
  return (
    <AtlasFlowSingle
      platform={screen}
      initialScreen={initialScreen || 'login'}
      scenario={scenario}
    />
  );
}

// Wrapper that applies theme override via setState hack -- simplest path:
// a CSS filter on the root for "light" mode is inappropriate. Instead we
// re-render with theme prop via a top-level ThemeCtx.
const ThemeCtx = React.createContext('dark');

function ThemedBackdrop() {
  const theme = React.useContext(ThemeCtx);
  return <BlueBackdrop theme={theme}/>;
}
// Override global BlueBackdrop export to respect context:
const _origBackdrop = window.BlueBackdrop;
window.BlueBackdrop = function(props) {
  const theme = React.useContext(ThemeCtx);
  return _origBackdrop({ theme: props.theme || theme });
};

function App() {
  const [theme, setTheme] = React.useState(TWEAK_DEFAULS.theme || 'dark');

  // Tweaks wiring
  React.useEffect(() => {
    const panel = document.getElementById('tweaksPanel');
    const seg = document.getElementById('themeSeg');
    const handle = (e) => {
      if (e.data?.type === '__activate_edit_mode') panel.classList.add('on');
      if (e.data?.type === '__deactivate_edit_mode') panel.classList.remove('on');
    };
    window.addEventListener('message', handle);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    seg.addEventListener('click', (e) => {
      const b = e.target.closest('button[data-theme]');
      if (!b) return;
      const t = b.dataset.theme;
      setTheme(t);
      seg.querySelectorAll('button').forEach(btn => btn.classList.toggle('on', btn.dataset.theme === t));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: t } }, '*');
    });

    // set initial seg state
    seg.querySelectorAll('button').forEach(btn => btn.classList.toggle('on', btn.dataset.theme === (TWEAK_DEFAULS.theme || 'dark')));

    return () => window.removeEventListener('message', handle);
  }, []);

  return (
    <ThemeCtx.Provider value={theme}>
      <DesignCanvas>
        <DCSection id="splash-flow" title="1 · Abertura" subtitle="O usuário inicia o app e cai no login.">
          <DCArtboard id="splash-and" label="Splash" width={390} height={844}>
            <AtlasFlowSingle platform="android" initialScreen="splash"/>
          </DCArtboard>
        </DCSection>

        <DCSection id="login" title="2 · Login" subtitle="E-mail + senha, com opção de recuperação.">
          <DCArtboard id="login-and" label="Login · vazio" width={390} height={844}>
            <AtlasFlowSingle platform="android" initialScreen="login"/>
          </DCArtboard>
          <DCArtboard id="login-and-filled" label="Login · preenchido · interativo" width={390} height={844}>
            <FilledDemo platform="android"/>
          </DCArtboard>
        </DCSection>

        <DCSection id="errors" title="3 · Erros" subtitle="Senha incorreta, bloqueio, sem conexão.">
          <DCArtboard id="err-wrong" label="Senha incorreta" width={390} height={844}>
            <AtlasFlowSingle platform="android" initialScreen="login" scenario="wrong"/>
          </DCArtboard>
          <DCArtboard id="err-locked" label="Conta bloqueada" width={390} height={844}>
            <AtlasFlowSingle platform="android" initialScreen="login" scenario="locked"/>
          </DCArtboard>
          <DCArtboard id="err-net" label="Sem conexão" width={390} height={844}>
            <AtlasFlowSingle platform="android" initialScreen="login" scenario="network"/>
          </DCArtboard>
        </DCSection>

        <DCSection id="forgot" title="4 · Esqueci minha senha" subtitle="E-mail → código → nova senha → sucesso.">
          <DCArtboard id="forgot-email" label="Passo 1 · E-mail" width={390} height={844}>
            <AtlasFlowSingle platform="android" initialScreen="forgot-email"/>
          </DCArtboard>
          <DCArtboard id="forgot-code" label="Passo 2 · Código" width={390} height={844}>
            <PreFilledForgot step="forgot-code" platform="android"/>
          </DCArtboard>
          <DCArtboard id="forgot-code-err" label="Passo 2 · Código inválido" width={390} height={844}>
            <PreFilledForgot step="forgot-code" platform="android" codeError/>
          </DCArtboard>
          <DCArtboard id="forgot-new" label="Passo 3 · Nova senha" width={390} height={844}>
            <PreFilledForgot step="forgot-new" platform="android"/>
          </DCArtboard>
          <DCArtboard id="forgot-success" label="Sucesso" width={390} height={844}>
            <AtlasFlowSingle platform="android" initialScreen="forgot-success"/>
          </DCArtboard>
        </DCSection>

        <DCSection id="success" title="5 · Acesso concedido" subtitle="Confirmação antes da área de trabalho.">
          <DCArtboard id="login-ok-and" label="Sucesso" width={390} height={844}>
            <AtlasFlowSingle platform="android" initialScreen="login-success"/>
          </DCArtboard>
        </DCSection>

        <DCSection id="clinic-detail" title="7 · Clínica · página individual" subtitle="Tudo que um consultor precisa antes de entrar na clínica: sinais, saúde comercial, produtos em uso, histórico de visitas e dossiê dos médicos.">
          <DCArtboard id="clinic-full" label="Página completa · rolagem" width={390} height={2800}>
            <AndroidDevice width={390} height={2800}>
              <ClinicDetailScreen/>
            </AndroidDevice>
          </DCArtboard>
          <DCArtboard id="clinic-top" label="Acima da dobra" width={390} height={844}>
            <AndroidDevice width={390} height={844}>
              <ClinicDetailScreen/>
            </AndroidDevice>
          </DCArtboard>
          <DCArtboard id="clinic-doctors" label="Dossiê dos médicos" width={390} height={900}>
            <AndroidDevice width={390} height={900}>
              <div style={{position:'absolute',inset:0,background:'#f7f8fb',overflowY:'auto',paddingTop:16}}>
                <ClinicDoctors doctors={CLINIC_DETAIL.doctors}/>
                <ClinicNotes notes={CLINIC_DETAIL.notes}/>
              </div>
            </AndroidDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="doctor-detail" title="8 · Médico · página individual" subtitle="Perfil detalhado de um médico — pessoal, prescrição, clínicas onde atende, histórico de visitas.">
          <DCArtboard id="doctor-full" label="Página completa · rolagem" width={390} height={2400}>
            <AndroidDevice width={390} height={2400}>
              <DoctorDetailScreen/>
            </AndroidDevice>
          </DCArtboard>
          <DCArtboard id="doctor-top" label="Acima da dobra" width={390} height={844}>
            <AndroidDevice width={390} height={844}>
              <DoctorDetailScreen/>
            </AndroidDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="list" title="6 · Lista — Clínicas & Médicos" subtitle="Busca unificada com scroll infinito, filtros e ordenação.">
          <DCArtboard id="list-clinics" label="Clínicas · padrão" width={390} height={844}>
            <AndroidDevice width={390} height={844}>
              <ListScreen initialKind="clinic"/>
            </AndroidDevice>
          </DCArtboard>
          <DCArtboard id="list-doctors" label="Médicos · padrão" width={390} height={844}>
            <AndroidDevice width={390} height={844}>
              <ListScreen initialKind="doctor"/>
            </AndroidDevice>
          </DCArtboard>
          <DCArtboard id="list-search" label="Buscando" width={390} height={844}>
            <AndroidDevice width={390} height={844}>
              <ListScreen initialKind="clinic" initialQuery="santa"/>
            </AndroidDevice>
          </DCArtboard>
          <DCArtboard id="list-filter" label="Filtros aplicados" width={390} height={844}>
            <AndroidDevice width={390} height={844}>
              <ListScreen initialKind="clinic" initialFilters={{ status: ['ativa','negociacao'], products: ['AtlasGel'] }}/>
            </AndroidDevice>
          </DCArtboard>
          <DCArtboard id="list-filter-sheet" label="Painel de filtros" width={390} height={844}>
            <AndroidDevice width={390} height={844}>
              <ListScreen initialKind="clinic" initialFilterOpen/>
            </AndroidDevice>
          </DCArtboard>
          <DCArtboard id="list-sort-sheet" label="Painel de ordenação" width={390} height={844}>
            <AndroidDevice width={390} height={844}>
              <ListScreen initialKind="clinic" initialSortOpen/>
            </AndroidDevice>
          </DCArtboard>
          <DCArtboard id="list-empty" label="Sem resultados" width={390} height={844}>
            <AndroidDevice width={390} height={844}>
              <ListScreen initialKind="clinic" initialQuery="zzzzz"/>
            </AndroidDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    </ThemeCtx.Provider>
  );
}

// An interactive, prefilled login — user can click Entrar and see the flow run.
function FilledDemo({ platform }) {
  const ctrl = useAtlasController({ initialScreen: 'login' });
  React.useEffect(() => {
    ctrl.setState({ email: 'rafael.melo@atlasmed.com', password: 'Atlas2026' });
  }, []);
  const Frame = platform === 'ios' ? IOSDevice : AndroidDevice;
  return (
    <Frame width={390} height={844}>
      <AtlasFlowScreen ctrl={ctrl}/>
    </Frame>
  );
}

// Forgot-flow artboards with prefilled context
function PreFilledForgot({ step, platform, codeError = false }) {
  const ctrl = useAtlasController({ initialScreen: step });
  React.useEffect(() => {
    ctrl.setState({
      forgotEmail: 'rafael.melo@atlasmed.com',
      code: step === 'forgot-code' ? (codeError ? '123000' : '') : '123456',
      codeError,
      newPassword: step === 'forgot-new' ? 'Atlas2026' : '',
      confirmPassword: step === 'forgot-new' ? 'Atlas2026' : '',
    });
  }, []);
  const Frame = platform === 'ios' ? IOSDevice : AndroidDevice;
  return (
    <Frame width={390} height={844}>
      <AtlasFlowScreen ctrl={ctrl}/>
    </Frame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
