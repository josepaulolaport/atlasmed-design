// ─────────────────────────────────────────────────────────────
// Atlasmed — Figma export hub
//
// Renders one screen per URL at exactly its pixel dimensions, so
// html.to.design (or any HTML→Figma plugin) gets a clean, single-frame
// import per call.
//
//   - `?frame=<id>`              → renders just that screen, body sized
//                                  to the frame; no padding, no chrome,
//                                  no labels.
//   - `?frame=<id>&chrome=device`→ wraps in an AndroidDevice mockup
//                                  (only meaningful for screens that
//                                  don't already include device chrome).
//   - no query string            → renders the index page (a clickable
//                                  table of contents with all URLs).
// ─────────────────────────────────────────────────────────────

// ─── Theme context (some screens read it via window.BlueBackdrop) ───
const ThemeCtx = React.createContext('dark');
const _origBlueBackdrop = window.BlueBackdrop;
window.BlueBackdrop = function (props) {
  const theme = React.useContext(ThemeCtx);
  return _origBlueBackdrop({ theme: props.theme || theme });
};

// ─── Login-flow helpers (lifted from index.html so the same demo
//    states render here without depending on the multi-page mount) ───
function FilledDemo({ platform = 'android' }) {
  const ctrl = useAtlasController({ initialScreen: 'login' });
  React.useEffect(() => {
    ctrl.setState({ email: 'rafael.melo@atlasmed.com', password: 'Atlas2026' });
  }, []);
  const Frame = platform === 'ios' ? IOSDevice : AndroidDevice;
  return <Frame width={390} height={844}><AtlasFlowScreen ctrl={ctrl}/></Frame>;
}

function PreFilledForgot({ step, platform = 'android', codeError = false }) {
  const ctrl = useAtlasController({ initialScreen: step });
  React.useEffect(() => {
    ctrl.setState({
      forgotEmail: 'rafael.melo@atlasmed.com',
      code: step === 'forgot-code' ? (codeError ? '123000' : '') : '123456',
      codeError,
      newPassword: step === 'forgot-new' ? 'Atlas2026' : '',
      confirmPassword: step === 'forgot-new' ? 'Atlas2026' : '',
    });
  }, []);
  const Frame = platform === 'ios' ? IOSDevice : AndroidDevice;
  return <Frame width={390} height={844}><AtlasFlowScreen ctrl={ctrl}/></Frame>;
}

// ─── Tiny helper: BIScreen lives in atlas-bi.jsx and uses
//    `position: absolute; inset: 0`, so it must always be wrapped in a
//    `position: relative` box of the right size or it escapes to the
//    viewport. Other screens already wrap themselves. ───
function BIBox({ width, height, view }) {
  return (
    <div style={{ position: 'relative', width, height, background: '#f7f8fb', overflow: 'hidden' }}>
      <BIScreen initialView={view}/>
    </div>
  );
}

//     device chrome or page wrapper required for that screen).
//   - `group` is used to organize the index page.
//   - `label` is a human-readable name shown on the index.

  // ── Perfil ────────────────────────────────────────────────────────
  'perfil/full':               { group: 'Perfil', label: 'Perfil · tela completa', width: 390, height: 1600,
    render: () => (
      <div style={{ position:'relative', width:390, height:1600, background:'#f7f8fb', overflow:'hidden' }}>
        <ProfileScreen/>
      </div>
    ) },
  'perfil/device':             { group: 'Perfil', label: 'Perfil · dispositivo', width: 390, height: 844,
    render: () => <AndroidDevice width={390} height={844}><ProfileScreen/></AndroidDevice> },
  'perfil/logout':             { group: 'Perfil', label: 'Perfil · confirmação de sair', width: 390, height: 844,
    render: () => <AndroidDevice width={390} height={844}><ProfileScreen logoutConfirm/></AndroidDevice> },
};

// ─── Single-frame renderer ────────────────────────────────────────
function SingleFrame({ frameId, withChrome }) {
  const cfg = FRAMES[frameId];

  React.useLayoutEffect(() => {
    if (!cfg) return;
    const html = document.documentElement;
    const body = document.body;
    html.style.margin = '0'; html.style.padding = '0'; html.style.background = '#fff';
    body.style.margin = '0'; body.style.padding = '0'; body.style.background = '#fff';
    body.style.width  = cfg.width + 'px';
    body.style.height = cfg.height + 'px';
    body.style.overflow = 'hidden';
  }, [frameId, cfg]);

  if (!cfg) {
    return (
      <div style={{ padding: 32, fontFamily: 'Inter, system-ui' }}>
        <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>
          Frame “{frameId}” não encontrado.
        </div>
        <div style={{ fontSize: 13, color: '#6b7280', marginBottom: 16 }}>
          Volte para o índice removendo o parâmetro <code>?frame=...</code>.
        </div>
        <a href="?" style={{ color: '#1e40af', fontSize: 13, fontWeight: 600 }}>← Índice</a>
      </div>
    );
  }

  const inner = cfg.render();
  return (
    <ThemeCtx.Provider value="dark">
      <div style={{ position: 'relative', width: cfg.width, height: cfg.height, background: '#fff' }}>
        {withChrome ? (
          <AndroidDevice width={cfg.width} height={cfg.height}>
            <div style={{ position: 'relative', width: '100%', height: '100%' }}>{inner}</div>
          </AndroidDevice>
        ) : inner}
      </div>
    </ThemeCtx.Provider>
  );
}

// ─── Index page (clickable table of contents) ─────────────────────
function IndexPage() {
  const groups = {};
  for (const [id, cfg] of Object.entries(FRAMES)) {
    if (!groups[cfg.group]) groups[cfg.group] = [];
    groups[cfg.group].push({ id, ...cfg });
  }
  const total = Object.keys(FRAMES).length;
  const base = window.location.origin + window.location.pathname;
  const copy = (text) => navigator.clipboard?.writeText(text);

  return (
    <div style={{
      minHeight: '100vh', background: '#f0eee9',
      padding: '48px 32px 80px',
      fontFamily: 'Inter, system-ui',
    }}>
      <div style={{ maxWidth: 880, margin: '0 auto' }}>
        <div style={{
          fontSize: 11, fontWeight: 700, letterSpacing: 1.4,
          textTransform: 'uppercase', color: '#8a94a6', marginBottom: 6,
        }}>Atlasmed · export</div>
        <div style={{ fontSize: 28, fontWeight: 700, color: '#0f1729', letterSpacing: -0.4, marginBottom: 8 }}>
          {total} frames disponíveis para html.to.design
        </div>
        <div style={{ fontSize: 14, color: '#6b7280', lineHeight: 1.5, marginBottom: 28, maxWidth: 660 }}>
          Cada link abaixo renderiza apenas o frame indicado, no tamanho exato do design.
          Cole a URL no plugin <b>html.to.design</b> dentro do Figma para importar como camadas
          editáveis. Adicione <code>&chrome=device</code> ao final da URL para envolver em um
          mockup Android.
        </div>

        <div style={{
          padding: '12px 14px', borderRadius: 12,
          background: '#fff', border: '1px solid #eef0f3',
          marginBottom: 28, display: 'flex', alignItems: 'center', gap: 12,
        }}>
          <button onClick={() => copy(Object.keys(FRAMES).map(id => `${base}?frame=${id}`).join('\n'))} style={{
            padding: '8px 14px', borderRadius: 10, border: 'none',
            background: 'linear-gradient(165deg, #0a2f7f, #1e40af)', color: '#fff',
            fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'Inter, system-ui',
          }}>Copiar todas as URLs</button>
          <span style={{ fontSize: 12, color: '#6b7280' }}>
            Cola uma lista com {total} URLs no clipboard.
          </span>
        </div>

        {Object.entries(groups).map(([groupName, items]) => (
          <div key={groupName} style={{ marginBottom: 36 }}>
            <div style={{
              display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
              marginBottom: 12, paddingBottom: 8, borderBottom: '1px solid #e5e7eb',
            }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: '#0f1729', letterSpacing: -0.2 }}>
                {groupName}
              </div>
              <div style={{ fontSize: 12, color: '#8a94a6', fontVariantNumeric: 'tabular-nums' }}>
                {items.length} frames
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 4 }}>
              {items.map(it => {
                const url = `${base}?frame=${it.id}`;
                return (
                  <div key={it.id} style={{
                    display: 'grid',
                    gridTemplateColumns: '1fr auto auto',
                    gap: 12, alignItems: 'center',
                    padding: '10px 12px', borderRadius: 10,
                    background: '#fff', border: '1px solid #eef0f3',
                  }}>
                    <div style={{ minWidth: 0 }}>
                      <a href={`?frame=${it.id}`} target="_blank" rel="noreferrer"
                        style={{ fontSize: 13.5, fontWeight: 600, color: '#0f1729', textDecoration: 'none' }}>
                        {it.label}
                      </a>
                      <div style={{
                        fontSize: 11, color: '#6b7280', marginTop: 2,
                        fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace',
                        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                      }}>{it.id} · {it.width}×{it.height}</div>
                    </div>
                    <button onClick={() => copy(url)} title="Copiar URL"
                      style={{
                        padding: '6px 10px', borderRadius: 8, border: '1px solid #eef0f3',
                        background: '#f7f9fc', color: '#1e40af', fontSize: 11, fontWeight: 600,
                        cursor: 'pointer', fontFamily: 'Inter, system-ui',
                      }}>Copiar URL</button>
                    <a href={`?frame=${it.id}`} target="_blank" rel="noreferrer"
                      style={{
                        padding: '6px 10px', borderRadius: 8,
                        background: 'linear-gradient(165deg, #0a2f7f, #1e40af)', color: '#fff',
                        fontSize: 11, fontWeight: 700, textDecoration: 'none',
                      }}>Abrir ↗</a>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Mount ────────────────────────────────────────────────────────
function App() {
  const params = new URLSearchParams(window.location.search);
  const frameId = params.get('frame');
  if (frameId) {
    return <SingleFrame frameId={frameId} withChrome={params.get('chrome') === 'device'}/>;
  }
  return <IndexPage/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
